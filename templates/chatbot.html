<!DOCTYPE html>
<html>
<head>
  <title>My AI Bot</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial; background: #1a1a2e; color: white; height: 100vh; display: flex; flex-direction: column; }
    header { background: #16213e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00d4ff33; }
    h2 { color: #00d4ff; font-size: 20px; }
    #correction-count { background: #e94560; padding: 5px 12px; border-radius: 20px; font-size: 13px; }
    #chatbox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .user-msg { background: #0f3460; padding: 12px 16px; border-radius: 16px 16px 4px 16px; align-self: flex-end; max-width: 70%; font-size: 15px; line-height: 1.5; }
    .bot-msg { background: #16213e; padding: 14px 18px; border-radius: 16px 16px 16px 4px; align-self: flex-start; max-width: 85%; width: 85%; border: 1px solid #00d4ff22; font-size: 15px; line-height: 1.6; }
    .tag { font-size: 11px; font-weight: bold; margin-bottom: 8px; padding: 3px 8px; border-radius: 10px; display: inline-block; margin-right: 6px; }
    .searched-tag { background: #00d4ff22; color: #00d4ff; }
    .agent-tag { background: #00ff8822; color: #00ff88; }
    .research-tag { background: #ff880022; color: #ff8800; }
    .image-tag { background: #ff00ff22; color: #ff88ff; }
    .sources-tag { font-size: 11px; color: #888; margin-bottom: 8px; padding: 2px 8px; display: block; }
    .graph-container { width: 100%; height: 420px; margin-top: 12px; border-radius: 10px; overflow: hidden; background: rgba(0,0,0,0.2); }
    .image-wrapper { margin-top: 12px; }
    .generated-image { display: block; width: 100%; max-width: 600px; border-radius: 12px; border: 1px solid #00d4ff33; margin-top: 8px; }
    .image-loading { color: #aaa; font-size: 13px; margin-top: 8px; }
    .image-link { color: #00d4ff; font-size: 13px; display: block; margin-top: 8px; }
    .correct-btn { background: none; border: 1px solid #444; color: #888; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; margin-top: 10px; transition: all 0.2s; }
    .correct-btn:hover { border-color: #e94560; color: #e94560; }
    .correct-btn:disabled { opacity: 0.5; cursor: default; }
    #input-area { background: #16213e; padding: 15px 20px; display: flex; gap: 10px; border-top: 1px solid #00d4ff22; }
    #input { flex: 1; background: #0f3460; border: 1px solid #00d4ff44; color: white; padding: 13px 16px; border-radius: 12px; font-size: 15px; outline: none; transition: border 0.2s; }
    #input:focus { border-color: #00d4ff; }
    #send { background: #00d4ff; color: #1a1a2e; border: none; padding: 13px 26px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 15px; transition: background 0.2s; }
    #send:hover { background: #00b8d9; }
    #send:disabled { background: #555; cursor: default; }
    pre { background: #0d0d0d; padding: 12px; border-radius: 8px; overflow-x: auto; margin-top: 10px; font-size: 13px; border: 1px solid #333; }
    .thinking-dots span { animation: blink 1.4s infinite; opacity: 0; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h2>🤖 My AI Bot</h2>
    <span id="correction-count">0 corrections learned</span>
  </header>
  <div id="chatbox">
    <div class="bot-msg">👋 Hi! I can chat, write code, search the web, do deep research, create graphs, and generate images! Try asking me something!</div>
  </div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Chat, code, search, research, graphs, or generate images..." />
    <button id="send" onclick="sendMessage()">Send</button>
  </div>

  <script>
    let correctionCount = 0;
    let graphCount = 0;
    let isLoading = false;

    async function sendMessage() {
      if (isLoading) return;
      const input = document.getElementById("input");
      const chatbox = document.getElementById("chatbox");
      const sendBtn = document.getElementById("send");
      const message = input.value.trim();
      if (!message) return;

      isLoading = true;
      sendBtn.disabled = true;

      const userDiv = document.createElement("div");
      userDiv.className = "user-msg";
      userDiv.textContent = message;
      chatbox.appendChild(userDiv);
      input.value = "";

      const thinkingDiv = document.createElement("div");
      thinkingDiv.className = "bot-msg";
      thinkingDiv.innerHTML = "⏳ Thinking<span class='thinking-dots'><span>.</span><span>.</span><span>.</span></span>";
      chatbox.appendChild(thinkingDiv);
      chatbox.scrollTop = chatbox.scrollHeight;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        thinkingDiv.innerHTML = "";

        if (data.searched) {
          const tag = document.createElement("div");
          tag.className = "tag searched-tag";
          tag.textContent = "🌐 Web searched";
          thinkingDiv.appendChild(tag);
        }

        if (data.researched) {
          const tag = document.createElement("div");
          tag.className = "tag research-tag";
          tag.textContent = "🔍 Deep Research Agent";
          thinkingDiv.appendChild(tag);
          if (data.sources && data.sources.length > 0) {
            const sources = document.createElement("div");
            sources.className = "sources-tag";
            sources.textContent = "Sources: " + data.sources.join(", ");
            thinkingDiv.appendChild(sources);
          }
        }

        if (data.image_url) {
          const tag = document.createElement("div");
          tag.className = "tag image-tag";
          tag.textContent = "🎨 Image Generation A
